# Hypridle — idle daemon (replaces xss-lock)
# Reference: https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    lock_cmd = pidof hyprlock || hyprlock      # avoid double-lock
    before_sleep_cmd = loginctl lock-session   # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # wake monitors
    ignore_dbus_inhibit = false
}

listener {
    timeout = 300                              # 5 min idle
    on-timeout = hyprlock
}

listener {
    timeout = 600                              # 10 min idle
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}