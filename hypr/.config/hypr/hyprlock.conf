# Hyprlock — screen locker (replaces i3lock)
# Reference: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 4
}

input-field {
    monitor =
    size = 300, 40
    outline_thickness = 2
    outer_color = rgba(92a2d5ff)
    inner_color = rgba(161617ff)
    font_color = rgba(c9c7cdff)
    fade_on_empty = true
    placeholder_text = <span foreground="#9f9ca6">password</span>
    hide_input_on_empty = false
    check_color = rgba(90b99fff)
    fail_color = rgba(ea83a5ff)
    fail_text = <span foreground="#ea83a5">$FAIL</span>
    position = 0, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = $TIME
    font_size = 96
    font_family = FiraCode Nerd Font Mono
    color = rgba(c9c7cdff)
    position = 0, 50
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date "+%Y-%m-%d  %H:%M"
    font_size = 24
    font_family = FiraCode Nerd Font Mono
    color = rgba(9f9ca6ff)
    position = 0, -60
    halign = center
    valign = center
}