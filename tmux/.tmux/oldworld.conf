# OldWorld theme for tmux (matches neovim oldworld oled variant)
# Palette: https://github.com/dgox16/oldworld.nvim

# Status bar
set -g status-style "bg=#000000,fg=#c9c7cd"
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 60

# Status left (session name) — blue text, no solid block
set -g status-left "#[fg=#92a2d5,bold] #S #[default] "

# Status right (hostname + time) — subtle blocks, no solid accent
set -g status-right "#[bg=#2a2a2c,fg=#c9c7cd] %H:%M #[bg=#2a2a2c,fg=#c9c7cd] #h "

# Window status
setw -g window-status-format "#[bg=#000000,fg=#444448] #I:#W "
setw -g window-status-current-format "#[bg=#2a2a2c,fg=#92a2d5,bold] #I:#W #[bg=#000000,fg=#2a2a2c]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#2a2a2c"
set -g pane-active-border-style "fg=#92a2d5"

# Messages
set -g message-style "bg=#2a2a2c,fg=#c9c7cd,bold"
set -g message-command-style "bg=#2a2a2c,fg=#c9c7cd"

# Mode (copy mode) — use selection token, not solid accent
setw -g mode-style "bg=#313134,fg=#c9c7cd"

# Clock
setw -g clock-mode-colour "#92a2d5"
setw -g clock-mode-style 24

# Bell
setw -g window-status-bell-style "bg=#ea83a5,fg=#000000,bold"
